name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_GNXU4k8eiqhjBG6hNGoEuunX
  VERCEL_PROJECT_ID: prj_BrqBNZ4JXQQ78lNzvEM0nXYaOrq7

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Verify Vercel token is configured
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN repository secret is missing."
            echo "Add it in GitHub: Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm run security:audit

      - name: Verify local production build
        run: npm run build

      - name: Pull Vercel production environment
        run: npx vercel@latest pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel production artifact
        run: npx vercel@latest build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy full production build
        continue-on-error: true
        run: npx vercel@latest deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
