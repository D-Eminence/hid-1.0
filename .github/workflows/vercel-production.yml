name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_GNXU4k8eiqhjBG6hNGoEuunX
  VERCEL_PROJECT_ID: prj_BrqBNZ4JXQQ78lNzvEM0nXYaOrq7

jobs:
  deploy:
    if: ${{ secrets.VERCEL_TOKEN != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify local production build
        run: npm run build

      - name: Pull Vercel production environment
        run: npx vercel@latest pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel production artifact
        run: npx vercel@latest build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy full production build
        run: npx vercel@latest deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
